<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>物理抛体运动模拟器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f172a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  #app {
    background: #1e293b;
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    border-radius: 10px;
    background: #f8fafc;
    cursor: crosshair;
  }
  #controls {
    display: flex;
    flex-wrap: wrap;
    gap: 12px 20px;
    margin-top: 14px;
    padding: 12px 16px;
    background: #334155;
    border-radius: 10px;
    align-items: center;
  }
  .ctrl-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .ctrl-group label {
    color: #94a3b8;
    font-size: 13px;
    white-space: nowrap;
  }
  .ctrl-group input[type="range"] {
    width: 120px;
    accent-color: #3b82f6;
    background: transparent;
  }
  .ctrl-group .val {
    color: #e2e8f0;
    font-size: 14px;
    font-weight: 600;
    min-width: 40px;
  }
  #btn-launch {
    background: #22c55e;
    color: #fff;
    border: none;
    padding: 8px 28px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  #btn-launch:hover { background: #16a34a; }
  #btn-launch:disabled { background: #475569; cursor: not-allowed; }
  #btn-reset {
    background: #475569;
    color: #e2e8f0;
    border: none;
    padding: 8px 18px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s;
  }
  #btn-reset:hover { background: #64748b; }
  #status {
    color: #94a3b8;
    font-size: 13px;
    flex: 1;
    text-align: right;
  }
  #status .hl { color: #f1f5f9; font-weight: 600; }
  .mode-tabs {
    display: flex;
    gap: 0;
    background: #1e293b;
    border-radius: 6px;
    overflow: hidden;
  }
  .mode-tab {
    padding: 5px 14px;
    font-size: 12px;
    color: #94a3b8;
    cursor: pointer;
    transition: all 0.15s;
    border: none;
    background: transparent;
  }
  .mode-tab.active {
    background: #3b82f6;
    color: #fff;
  }
  .mode-tab:hover:not(.active) { color: #e2e8f0; }
  #trail-info {
    color: #64748b;
    font-size: 11px;
    margin-left: auto;
  }
</style>
</head>
<body>
<div id="app">
  <canvas id="c" width="900" height="580"></canvas>
  <div id="controls">
    <div class="ctrl-group">
      <label>初速度</label>
      <input type="range" id="sl-speed" min="5" max="80" value="30" step="1">
      <span class="val" id="val-speed">30</span>
      <span style="color:#64748b;font-size:12px">m/s</span>
    </div>
    <div class="ctrl-group">
      <label>角度</label>
      <input type="range" id="sl-angle" min="-90" max="90" value="45" step="1">
      <span class="val" id="val-angle">45</span>
      <span style="color:#64748b;font-size:12px">°</span>
    </div>
    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="launch">发射模式</button>
      <button class="mode-tab" data-mode="drag">拖拽模式</button>
    </div>
    <button id="btn-launch">发射</button>
    <button id="btn-reset">重置</button>
    <div id="status">就绪 · <span class="hl">点击发射</span></div>
  </div>
</div>

<script>
// ============================================================
// 物理常量
// ============================================================
const G = 9.8;
const H0 = 100;
const PI = Math.PI;

// ============================================================
// Canvas
// ============================================================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, Hc = canvas.height;

// 坐标映射
const MT = 45, MB = 30, ML = 70, MR = 30;
const DH = Hc - MT - MB;  // ~505px for 100m
const DW = W - ML - MR;   // ~800px
const YS = DH / H0;       // px/m vertical
const XS = DW / 160;      // px/m horizontal (160m visible range)

function toCanvas(x, y) {
  return {
    x: Math.round(ML + x * XS),
    y: Math.round(MT + (H0 - y) * YS)
  };
}

// ============================================================
// 状态
// ============================================================
let state = {
  mode: 'launch',   // 'launch' | 'drag'
  flying: false,
  t: 0,
  x: 0, y: H0,
  vx: 0, vy: 0,
  v: 0,
  tGround: 0,
  trail: [],
  startX: 0, startY: H0,
  // 拖拽模式
  dragAngle: 45,
  dragSpeed: 30,
};

let lastTime = 0;
let groundY = toCanvas(0, 0).y;

// 发射参数
const speedSlider = document.getElementById('sl-speed');
const angleSlider = document.getElementById('sl-angle');
const valSpeed = document.getElementById('val-speed');
const valAngle = document.getElementById('val-angle');
const btnLaunch = document.getElementById('btn-launch');
const btnReset = document.getElementById('btn-reset');
const statusEl = document.getElementById('status');
const statusSpan = statusEl.querySelector('.hl');
// 状态栏使用 textContent 避免内HTML重排
function setStatus(prefix, highlight) {
  statusEl.childNodes[0].textContent = prefix + ' · ';
  statusSpan.textContent = highlight;
}

speedSlider.addEventListener('input', () => {
  valSpeed.textContent = speedSlider.value;
});
angleSlider.addEventListener('input', () => {
  valAngle.textContent = angleSlider.value;
});

// 模式切换
document.querySelectorAll('.mode-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    state.mode = tab.dataset.mode;
    resetSim();
    if (state.mode === 'drag') {
      setStatus('拖拽模式', '在画布上拖拽设定发射方向');
    } else {
      setStatus('发射模式', '调整参数后点击发射');
    }
  });
});

// ============================================================
// 物理计算
// ============================================================
function launch(v0, angleDeg) {
  const theta = angleDeg * PI / 180;
  state.v0x = v0 * Math.cos(theta);
  state.v0y = v0 * Math.sin(theta);
  state.vx = state.v0x;
  state.vy = state.v0y;
  state.v = v0;
  state.x = state.startX;
  state.y = state.startY;
  state.t = 0;
  state.trail = [];
  state.trail.push(toCanvas(state.x, state.y));
  state.flying = true;
  state.frozen = false;

  // 解 H0 + v0y*t - 0.5*g*t² = 0 得落地时间
  state.tGround = (state.v0y + Math.sqrt(state.v0y*state.v0y + 2*G*H0)) / G;

  btnLaunch.disabled = true;
  setStatus('飞行中', 't=0.00s');
}

function resetSim() {
  state.flying = false;
  state.x = state.startX;
  state.y = state.startY;
  state.vx = 0; state.vy = 0; state.v = 0;
  state.v0x = 0; state.v0y = 0;
  state.t = 0;
  state.trail = [];
  state.frozen = false;
  state.tGround = 0;
  btnLaunch.disabled = false;
  lastTime = 0;
}

function updatePhysics(dt) {
  if (!state.flying) return;
  if (state.frozen) return;

  state.t += dt;

  if (state.t >= state.tGround) {
    // 精确锁定到落地时刻
    state.t = state.tGround;
    state.x = state.startX + state.v0x * state.t;
    state.y = 0;
    state.vy = state.v0y - G * state.t;
    state.v = Math.sqrt(state.v0x*state.v0x + state.vy*state.vy);
    state.flying = false;
    state.frozen = true;
    btnLaunch.disabled = false;
    setStatus('落地！', 't=' + state.tGround.toFixed(2) + 's');
    // 记录最后轨迹点
    state.trail.push(toCanvas(state.x, 0));
    return;
  }

  // 精确公式计算位置和速度（非欧拉积分）
  state.x = state.startX + state.v0x * state.t;
  state.y = H0 + state.v0y * state.t - 0.5 * G * state.t * state.t;
  state.vy = state.v0y - G * state.t;
  state.v = Math.sqrt(state.v0x*state.v0x + state.vy*state.vy);

  // 轨迹
  const p = toCanvas(state.x, state.y);
  state.trail.push(p);
  if (state.trail.length > 800) state.trail.shift();
}

// ============================================================
// 发射按钮
// ============================================================
btnLaunch.addEventListener('click', () => {
  const v0 = parseFloat(speedSlider.value);
  const angle = parseFloat(angleSlider.value);
  resetSim();
  launch(v0, angle);
});

btnReset.addEventListener('click', resetSim);

// ============================================================
// 拖拽模式
// ============================================================
let isDragging = false;
let dragStart = null;
let dragEnd = null;

canvas.addEventListener('mousedown', (e) => {
  if (state.mode !== 'drag') return;
  if (state.flying) return;
  const rect = canvas.getBoundingClientRect();
  // 固定拖拽起点到平台位置
  const plat = toCanvas(0, H0);
  isDragging = true;
  dragStart = { x: plat.x, y: plat.y };
  dragEnd = { x: plat.x, y: plat.y };
});

canvas.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  // 只允许向右拖拽（dx > 0）
  const plat = toCanvas(0, H0);
  dragEnd = { x: Math.max(mx, plat.x + 1), y: my };
});

canvas.addEventListener('mouseup', () => {
  if (!isDragging || state.mode !== 'drag') return;
  isDragging = false;
  if (!dragStart || !dragEnd) return;

  const dx = dragEnd.x - dragStart.x;
  const dy = dragStart.y - dragEnd.y; // 画布y向下为正，物理y向上为正
  const dist = Math.sqrt(dx*dx + dy*dy);

  if (dist < 10) return; // 太短不发射

  // 拖拽长度映射到速度: 200px ≈ 80 m/s
  const v0 = Math.min(80, dist / 2.5);
  let angle = Math.atan2(dy, dx) * 180 / PI;
  angle = Math.max(-90, Math.min(90, angle));

  speedSlider.value = Math.round(v0);
  angleSlider.value = Math.round(angle);
  valSpeed.textContent = Math.round(v0);
  valAngle.textContent = Math.round(angle);

  resetSim();
  launch(v0, angle);
  dragStart = null;
  dragEnd = null;
});

// ============================================================
// 渲染
// ============================================================
function drawScene() {
  ctx.clearRect(0, 0, W, Hc);

  // 背景渐变
  const bg = ctx.createLinearGradient(0, 0, 0, Hc);
  bg.addColorStop(0, '#f0f4f8');
  bg.addColorStop(1, '#e2e8f0');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, Hc);

  // 网格 (每20m)
  ctx.strokeStyle = '#cbd5e1';
  ctx.lineWidth = 0.5;
  for (let y = 0; y <= H0; y += 20) {
    const py = toCanvas(0, y).y;
    ctx.beginPath();
    ctx.moveTo(ML, py);
    ctx.lineTo(W - MR, py);
    ctx.stroke();
  }
  // 垂直参考线
  for (let x = 0; x <= 160; x += 20) {
    const px = toCanvas(x, 0).x;
    ctx.beginPath();
    ctx.moveTo(px, MT);
    ctx.lineTo(px, MT + DH);
    ctx.stroke();
  }

  // 标尺
  const rx = 32;
  ctx.strokeStyle = '#64748b';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(rx, MT);
  ctx.lineTo(rx, MT + DH);
  ctx.stroke();
  ctx.fillStyle = '#334155';
  ctx.font = '11px "Segoe UI", sans-serif';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  for (let y = 0; y <= H0; y += 20) {
    const py = toCanvas(0, y).y;
    ctx.strokeStyle = '#64748b';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(rx - 5, py);
    ctx.lineTo(rx + 5, py);
    ctx.stroke();
    ctx.fillStyle = '#334155';
    ctx.fillText(y + 'm', rx - 9, py);
  }

  // 平台
  const plat = toCanvas(0, H0);
  ctx.strokeStyle = '#475569';
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(ML - 5, plat.y);
  ctx.lineTo(W - MR, plat.y);
  ctx.stroke();
  ctx.fillStyle = '#1e293b';
  ctx.font = 'bold 12px "Segoe UI", sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'bottom';
  ctx.fillText('100m', ML - 2, plat.y - 2);

  // 地面
  const gnd = toCanvas(0, 0);
  ctx.strokeStyle = '#16a34a';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(ML - 5, gnd.y);
  ctx.lineTo(W - MR, gnd.y);
  ctx.stroke();
  ctx.fillStyle = '#166534';
  ctx.font = 'bold 12px "Segoe UI", sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText('地面 0m', ML - 2, gnd.y + 3);

  // 拖拽指示线
  if (isDragging && dragStart && dragEnd && state.mode === 'drag') {
    ctx.strokeStyle = 'rgba(59,130,246,0.5)';
    ctx.lineWidth = 2;
    ctx.setLineDash([5, 4]);
    ctx.beginPath();
    ctx.moveTo(dragStart.x, dragStart.y);
    ctx.lineTo(dragEnd.x, dragEnd.y);
    ctx.stroke();
    ctx.setLineDash([]);

    // 拖拽起点小圈
    ctx.fillStyle = 'rgba(59,130,246,0.3)';
    ctx.beginPath();
    ctx.arc(dragStart.x, dragStart.y, 6, 0, PI*2);
    ctx.fill();

    // 角度和速度提示
    const dx = dragEnd.x - dragStart.x;
    const dy = dragStart.y - dragEnd.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > 10) {
      const v0 = Math.min(80, dist / 2.5);
      const angle = Math.atan2(dy, dx) * 180 / PI;
      ctx.fillStyle = 'rgba(15,23,42,0.8)';
      ctx.font = '12px "Segoe UI", sans-serif';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'bottom';
      ctx.fillText(`v=${Math.round(v0)} m/s  ${Math.round(angle)}°`, dragEnd.x + 10, dragEnd.y);
    }
  }

  // 轨迹
  if (state.trail.length > 1) {
    ctx.strokeStyle = '#3b82f6';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(state.trail[0].x, state.trail[0].y);
    for (let i = 1; i < state.trail.length; i++) {
      ctx.lineTo(state.trail[i].x, state.trail[i].y);
    }
    ctx.stroke();
  }

  // 小球
  const pos = toCanvas(state.x, state.y);
  // 发光
  const glow = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, 16);
  glow.addColorStop(0, '#3b82f655');
  glow.addColorStop(1, '#3b82f600');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, 16, 0, PI*2);
  ctx.fill();
  // 核心
  ctx.fillStyle = '#3b82f6';
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, 7, 0, PI*2);
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, 7, 0, PI*2);
  ctx.stroke();

  // 速度标签
  if (state.flying || state.frozen) {
    const lines = [
      `v = ${state.v.toFixed(1)} m/s`,
      `vx = ${state.vx.toFixed(1)} m/s`,
      `vy = ${Math.abs(state.vy).toFixed(1)} m/s ${state.vy < 0 ? '↓' : '↑'}`,
      `t = ${state.t.toFixed(2)} s`,
    ];
    const lx = Math.min(pos.x + 22, W - MR - 140);
    let ly = Math.min(pos.y - 8, Hc - MB - 5);
    for (let i = lines.length - 1; i >= 0; i--) {
      ctx.font = '13px "Segoe UI", sans-serif';
      const m = ctx.measureText(lines[i]);
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.fillRect(lx - 3, ly - 17, m.width + 6, 20);
      ctx.strokeStyle = '#e2e8f0';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(lx - 3, ly - 17, m.width + 6, 20);
      ctx.fillStyle = '#0f172a';
      ctx.fillText(lines[i], lx, ly - 1);
      ly -= 23;
    }
  }

  // 速度矢量箭头
  if (state.flying && state.v > 0.5) {
    const arrLen = Math.min(60, state.v * 0.8);
    const angle = Math.atan2(-state.vy, state.vx); // canvas y向下
    const ex = pos.x + arrLen * Math.cos(angle);
    const ey = pos.y - arrLen * Math.sin(angle);

    ctx.strokeStyle = '#ef4444';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
    ctx.lineTo(ex, ey);
    ctx.stroke();

    // 箭头头
    const headLen = 10;
    const headAngle = 0.45;
    ctx.fillStyle = '#ef4444';
    ctx.beginPath();
    ctx.moveTo(ex, ey);
    ctx.lineTo(
      ex - headLen * Math.cos(angle - headAngle),
      ey + headLen * Math.sin(angle - headAngle)
    );
    ctx.lineTo(
      ex - headLen * Math.cos(angle + headAngle),
      ey + headLen * Math.sin(angle + headAngle)
    );
    ctx.closePath();
    ctx.fill();
  }

  // 底部状态
  if (state.frozen && state.t >= state.tGround) {
    const vyF = state.vy;
    const vF = Math.sqrt(state.vx*state.vx + vyF*vyF);
    const xR = state.x;

    const info = [
      `落地时间  t = ${state.tGround.toFixed(2)} s`,
      `水平射程  x = ${xR.toFixed(1)} m`,
      `末速度    v = ${vF.toFixed(1)} m/s`,
    ];
    const bx = W/2 - 130, by = Hc/2 + 30, bw = 260, bh = info.length * 24 + 16, br = 8;
    ctx.fillStyle = 'rgba(15,23,42,0.88)';
    ctx.beginPath();
    ctx.moveTo(bx+br, by);
    ctx.lineTo(bx+bw-br, by);
    ctx.arcTo(bx+bw, by, bx+bw, by+br, br);
    ctx.lineTo(bx+bw, by+bh-br);
    ctx.arcTo(bx+bw, by+bh, bx+bw-br, by+bh, br);
    ctx.lineTo(bx+br, by+bh);
    ctx.arcTo(bx, by+bh, bx, by+bh-br, br);
    ctx.lineTo(bx, by+br);
    ctx.arcTo(bx, by, bx+br, by, br);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = '#fbbf24';
    ctx.font = 'bold 14px "Segoe UI", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    let ry = by + 8;
    for (const line of info) {
      ctx.fillText(line, W/2, ry);
      ry += 24;
    }
  }
}

// ============================================================
// 主循环
// ============================================================
function gameLoop(ts) {
  if (!lastTime) lastTime = ts;
  let dt = (ts - lastTime) / 1000;
  lastTime = ts;
  if (dt > 0.05) dt = 0.05;

  updatePhysics(dt);
  drawScene();

  // 更新状态栏（每5帧刷新一次减少回流）
  if (state.flying) {
    const frameInfo = `t=${state.t.toFixed(2)}s  v=${state.v.toFixed(1)}m/s  y=${Math.max(0,state.y).toFixed(1)}m`;
    if (statusSpan.textContent !== frameInfo) {
      setStatus('飞行中', frameInfo);
    }
  }

  requestAnimationFrame(gameLoop);
}

// ============================================================
// 启动
// ============================================================
resetSim();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
