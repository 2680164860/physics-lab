<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>物理引擎精度测试 - 自由落体</title>
<style>
  body { font-family: 'Segoe UI', monospace; background: #0a0e1a; color: #e8edf5; padding: 40px; max-width: 700px; margin: 0 auto; }
  h1 { color: #22d3ee; font-size: 20px; }
  .result { background: #111827; border: 1px solid #2a3a5c; border-radius: 8px; padding: 20px; margin: 16px 0; }
  .pass { color: #10b981; font-weight: bold; }
  .fail { color: #ef4444; font-weight: bold; }
  .val { color: #22d3ee; font-weight: bold; }
  table { width: 100%; border-collapse: collapse; margin: 12px 0; }
  td, th { padding: 8px 12px; border-bottom: 1px solid #2a3a5c; text-align: left; }
  th { color: #5a6e8a; font-size: 12px; text-transform: uppercase; }
  button { background: #22d3ee; color: #0a0e1a; border: none; padding: 10px 28px; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; }
  button:hover { background: #06b6d4; }
  .info { color: #8899b4; font-size: 13px; }
</style>
</head>
<body>
<h1>物理引擎精度测试 — 自由落体</h1>
<p class="info">将小球从 490 米高度释放，理论落地时间 = √(2h/g) = √(980/9.8) = 10.00 秒</p>

<div class="result" id="results">
  <table>
    <tr><th>参数</th><th>值</th></tr>
    <tr><td>重力加速度 g</td><td>9.8 m/s²</td></tr>
    <tr><td>下落高度 h</td><td>490 m</td></tr>
    <tr><td>理论落地时间</td><td>10.000 s</td></tr>
    <tr><td>当前物理时间</td><td id="simTime">—</td></tr>
    <tr><td>现实经过时间</td><td id="realTime">—</td></tr>
    <tr><td>小球 Y 位置</td><td id="ballPos">—</td></tr>
    <tr><td>小球速度</td><td id="ballVel">—</td></tr>
  </table>
  <div id="status" style="margin-top:12px;font-size:16px;">等待开始...</div>
</div>

<div style="display:flex;gap:12px;margin-top:16px;">
  <button id="btnStart">▶ 开始测试</button>
  <button id="btnReset">↺ 重置</button>
  <span style="flex:1"></span>
  <span id="fps" style="color:#5a6e8a;font-size:12px;align-self:center;"></span>
</div>

<script>
// Physics engine (same as main file)
class Vec2 {
  constructor(x = 0, y = 0) { this.x = x; this.y = y; }
  add(v) { return new Vec2(this.x + v.x, this.y + v.y); }
  sub(v) { return new Vec2(this.x - v.x, this.y - v.y); }
  scale(s) { return new Vec2(this.x * s, this.y * s); }
  dot(v) { return this.x * v.x + this.y * v.y; }
  len() { return Math.sqrt(this.x*this.x + this.y*this.y); }
  normalize() { const l = this.len(); return l > 0 ? this.scale(1/l) : new Vec2(); }
  clone() { return new Vec2(this.x, this.y); }
}

class RigidBody {
  constructor(opts = {}) {
    this.id = RigidBody._nextId++;
    this.pos = new Vec2(opts.x || 0, opts.y || 0);
    this.vel = new Vec2(opts.vx || 0, opts.vy || 0);
    this.acc = new Vec2(0, 0);
    this.radius = opts.radius || 8;
    this.mass = opts.mass || 1;
    this.isStatic = opts.isStatic || false;
    this.active = true;
  }
  get invMass() { return this.isStatic ? 0 : 1 / this.mass; }
  applyForce(fx, fy) {
    if (this.isStatic) return;
    this.acc.x += fx * this.invMass;
    this.acc.y += fy * this.invMass;
  }
}
RigidBody._nextId = 0;

class PhysicsEngine {
  constructor() {
    this.bodies = [];
    this.gravity = new Vec2(0, 9.8);
    this.running = false;
    this.time = 0;
    this.speed = 1;
    this.fixedDt = 1 / 240;
    this.accumulator = 0;
  }
  addBody(body) { this.bodies.push(body); return body; }
  update(dt) {
    if (!this.running) return;
    const scaledDt = dt * this.speed;
    this.accumulator += scaledDt;
    if (this.accumulator > this.fixedDt * 20) this.accumulator = this.fixedDt * 20;
    while (this.accumulator >= this.fixedDt) {
      this._step(this.fixedDt);
      this.accumulator -= this.fixedDt;
    }
    this.time += scaledDt;
  }
  _step(dt) {
    for (const b of this.bodies) {
      if (b.isStatic || !b.active) continue;
      b.applyForce(this.gravity.x * b.mass, this.gravity.y * b.mass);
    }
    for (const b of this.bodies) {
      if (b.isStatic || !b.active) continue;
      b.vel.x += b.acc.x * dt;
      b.vel.y += b.acc.y * dt;
      b.pos.x += b.vel.x * dt;
      b.pos.y += b.vel.y * dt;
      b.acc.x = 0;
      b.acc.y = 0;
    }
  }
}

// Test setup
const physics = new PhysicsEngine();
const START_HEIGHT = 490;
const EXPECTED_TIME = Math.sqrt(2 * START_HEIGHT / 9.8); // sqrt(980/9.8) = 10s

let ball = null;
let startRealTime = 0;
let testRunning = false;
let results = [];
let landed = false;

// DOM
const elSimTime = document.getElementById('simTime');
const elRealTime = document.getElementById('realTime');
const elBallPos = document.getElementById('ballPos');
const elBallVel = document.getElementById('ballVel');
const elStatus = document.getElementById('status');
const elFps = document.getElementById('fps');
const btnStart = document.getElementById('btnStart');
const btnReset = document.getElementById('btnReset');

function resetTest() {
  physics.running = false;
  physics.time = 0;
  physics.accumulator = 0;
  physics.bodies = [];
  ball = new RigidBody({ x: 0, y: -START_HEIGHT, mass: 1, radius: 8 });
  physics.addBody(ball);
  testRunning = false;
  startRealTime = 0;
  results = [];
  landed = false;
  elStatus.textContent = '就绪，点击「开始测试」';
  elStatus.style.color = '#8899b4';
  updateDisplay();
}

function startTest() {
  resetTest();
  physics.running = true;
  physics.speed = 1; // ensure 1x speed
  startRealTime = performance.now();
  testRunning = true;
  landed = false;
  elStatus.textContent = '● 测试运行中...';
  elStatus.style.color = '#22d3ee';
  btnStart.disabled = true;
}

function updateDisplay() {
  if (!ball) return;
  elSimTime.textContent = physics.time.toFixed(4) + ' s';
  if (startRealTime > 0) {
    const elapsed = (performance.now() - startRealTime) / 1000;
    elRealTime.textContent = elapsed.toFixed(4) + ' s';
  }
  elBallPos.textContent = ball.pos.y.toFixed(2) + ' m';
  elBallVel.textContent = ball.vel.len().toFixed(4) + ' m/s';
}

let frameCount = 0;
let fpsTime = 0;

function gameLoop(time) {
  if (!window._lastTime) window._lastTime = time;
  let dt = (time - window._lastTime) / 1000;
  window._lastTime = time;
  if (dt > 0.05) dt = 0.05;

  // FPS counter
  frameCount++;
  if (time - fpsTime > 1000) {
    elFps.textContent = frameCount + ' FPS';
    frameCount = 0;
    fpsTime = time;
  }

  physics.update(dt);

  if (testRunning && ball) {
    // Check if ball passed the origin (y=0, ground level)
    if (ball.pos.y >= 0 && physics.time > 0.1 && !landed) {
      landed = true;
      physics.running = false;
      testRunning = false;
      const realElapsed = (performance.now() - startRealTime) / 1000;
      // Compare physics simulation time vs real wall-clock time
      const simVsRealError = Math.abs(physics.time - realElapsed);
      const simVsRealPct = (simVsRealError / physics.time * 100).toFixed(2);
      // Also compare physics time vs theoretical
      const theoryError = Math.abs(physics.time - EXPECTED_TIME);
      const theoryPct = (theoryError / EXPECTED_TIME * 100).toFixed(2);

      let verdict = '';
      let color = '';
      // Primary check: does physics simulation run at real-time speed?
      if (simVsRealPct < 1) {
        verdict = `✅ 通过! 物理时间与真实时间同步 (误差 ${simVsRealPct}%)`;
        color = '#10b981';
      } else if (simVsRealPct < 5) {
        verdict = `⚠️ 轻微偏差, 物理 vs 现实 误差 ${simVsRealPct}%`;
        color = '#f59e0b';
      } else {
        verdict = `❌ 异常! 物理 vs 现实 误差 ${simVsRealPct}%`;
        color = '#ef4444';
      }

      elStatus.innerHTML = `
        <span style="color:${color};font-size:18px;">${verdict}</span><br>
        <span style="color:#8899b4;font-size:13px;">
          物理时间 ${physics.time.toFixed(4)}s vs 现实时间 ${realElapsed.toFixed(4)}s
          (理论 ${EXPECTED_TIME.toFixed(4)}s · 理论误差 ${theoryPct}%)
        </span>
      `;
      btnStart.disabled = false;
    }

    // Record error over time
    if (frameCount % 10 === 0) {
      const expectedY = -START_HEIGHT + 0.5 * 9.8 * physics.time * physics.time;
      results.push({
        t: physics.time,
        actualY: ball.pos.y,
        expectedY: expectedY,
        vel: ball.vel.len()
      });
    }
  }

  updateDisplay();

  if (physics.running || testRunning || landed) {
    requestAnimationFrame(gameLoop);
  } else {
    // One more frame to show results
    requestAnimationFrame(gameLoop);
  }
}

btnStart.addEventListener('click', () => {
  startTest();
  window._lastTime = 0;
  requestAnimationFrame(gameLoop);
});

btnReset.addEventListener('click', () => {
  resetTest();
  window._lastTime = 0;
  btnStart.disabled = false;
  requestAnimationFrame(gameLoop);
});

// Init
resetTest();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
