<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>光学折射与反射模拟器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f172a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  #app {
    background: #1e293b;
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    user-select: none;
  }
  canvas {
    display: block;
    border-radius: 10px;
    background: #f8fafc;
    cursor: crosshair;
  }
  #controls {
    display: flex;
    flex-wrap: wrap;
    gap: 12px 20px;
    margin-top: 14px;
    padding: 12px 16px;
    background: #334155;
    border-radius: 10px;
    align-items: center;
  }
  .ctrl-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .ctrl-group label {
    color: #94a3b8;
    font-size: 13px;
    white-space: nowrap;
  }
  .ctrl-group input[type="range"] {
    width: 130px;
    accent-color: #3b82f6;
    background: transparent;
  }
  .ctrl-group .val {
    color: #e2e8f0;
    font-size: 14px;
    font-weight: 600;
    min-width: 44px;
  }
  #status {
    color: #94a3b8;
    font-size: 13px;
    flex: 1;
    text-align: right;
    min-width: 120px;
  }
  #status .hl { color: #f1f5f9; font-weight: 600; }
  .preset-btn {
    background: #475569;
    color: #e2e8f0;
    border: none;
    padding: 4px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .preset-btn:hover { background: #64748b; }
  .preset-btn.active { background: #3b82f6; color: #fff; }
  .preset-label {
    color: #64748b;
    font-size: 11px;
    margin-right: 4px;
  }
</style>
</head>
<body>
<div id="app">
  <canvas id="c" width="900" height="580"></canvas>
  <div id="controls">
    <div class="ctrl-group">
      <label>入射角 θ₁</label>
      <input type="range" id="sl-angle" min="0" max="89" value="30" step="0.5">
      <span class="val" id="val-angle">30</span>
      <span style="color:#64748b;font-size:12px">°</span>
    </div>
    <div class="ctrl-group">
      <label>折射率 n₂</label>
      <input type="range" id="sl-n" min="100" max="300" value="133" step="1">
      <span class="val" id="val-n">1.33</span>
    </div>
    <div class="ctrl-group" style="gap:3px">
      <span class="preset-label">预设:</span>
      <button class="preset-btn" data-n="100">空气</button>
      <button class="preset-btn active" data-n="133">水</button>
      <button class="preset-btn" data-n="150">玻璃</button>
      <button class="preset-btn" data-n="242">钻石</button>
    </div>
    <div id="status">
      n₁ = <span class="hl">1.00</span> &nbsp; n₂ = <span class="hl" id="status-n2">1.33</span>
    </div>
  </div>
</div>

<script>
// ============================================================
// 物理常量
// ============================================================
const PI = Math.PI;
const DEG = PI / 180;

// ============================================================
// Canvas
// ============================================================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// 交界面在画布垂直中点
const CX = W / 2;   // 入射点 x
const CY = H / 2;   // 入射点 y (交界面)
const RAY_LEN = 280;

// ============================================================
// DOM 引用
// ============================================================
const slAngle = document.getElementById('sl-angle');
const slN = document.getElementById('sl-n');
const valAngle = document.getElementById('val-angle');
const valN = document.getElementById('val-n');
const statusN2 = document.getElementById('status-n2');
const presetBtns = document.querySelectorAll('.preset-btn');

// ============================================================
// 状态
// ============================================================
let n1 = 1.0;
let n2 = 1.33;
let theta1 = 30 * DEG;   // 入射角（弧度）
let theta2 = 0;          // 折射角（弧度）
let hasRefraction = true;
let hasTIR = false;       // 全反射

// ============================================================
// 预设按钮
// ============================================================
presetBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    presetBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const nVal = parseInt(btn.dataset.n) / 100;
    slN.value = parseInt(btn.dataset.n);
    n2 = nVal;
    valN.textContent = nVal.toFixed(2);
    statusN2.textContent = nVal.toFixed(2);
    updatePhysics();
  });
});

// ============================================================
// 滑块事件
// ============================================================
slAngle.addEventListener('input', () => {
  valAngle.textContent = parseFloat(slAngle.value).toFixed(1);
  updatePhysics();
});
slN.addEventListener('input', () => {
  const v = parseInt(slN.value) / 100;
  n2 = v;
  valN.textContent = v.toFixed(2);
  statusN2.textContent = v.toFixed(2);
  // 取消预设高亮
  presetBtns.forEach(b => b.classList.remove('active'));
  updatePhysics();
});

// ============================================================
// 物理计算
// ============================================================
function updatePhysics() {
  theta1 = parseFloat(slAngle.value) * DEG;

  const sinTheta2 = (n1 / n2) * Math.sin(theta1);

  if (sinTheta2 > 1) {
    // 全反射
    hasTIR = true;
    hasRefraction = false;
    theta2 = PI / 2;
  } else {
    hasTIR = false;
    hasRefraction = true;
    theta2 = Math.asin(sinTheta2);
  }

  drawScene();
}

// ============================================================
// 渲染
// ============================================================
function drawScene() {
  ctx.clearRect(0, 0, W, H);

  // === 介质背景 ===
  // 上半：空气（浅色）
  const gradTop = ctx.createLinearGradient(0, 0, 0, CY);
  gradTop.addColorStop(0, '#f0f4f8');
  gradTop.addColorStop(1, '#e8edf5');
  ctx.fillStyle = gradTop;
  ctx.fillRect(0, 0, W, CY);

  // 下半：介质（带蓝色调）
  const gradBot = ctx.createLinearGradient(0, CY, 0, H);
  const alpha = Math.min(0.25, 0.04 + n2 * 0.06);
  gradBot.addColorStop(0, `rgba(59,130,246,${alpha * 0.5})`);
  gradBot.addColorStop(1, `rgba(59,130,246,${alpha})`);
  ctx.fillStyle = gradBot;
  ctx.fillRect(0, CY, W, H - CY);

  // === 介质标签 ===
  ctx.fillStyle = '#64748b';
  ctx.font = '13px "Segoe UI", sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'bottom';
  ctx.fillText(`n₁ = ${n1.toFixed(2)} (空气)`, 16, CY - 8);
  ctx.textBaseline = 'top';
  ctx.fillText(`n₂ = ${n2.toFixed(2)}`, 16, CY + 8);

  // === 交界面 ===
  ctx.strokeStyle = '#475569';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(40, CY);
  ctx.lineTo(W - 40, CY);
  ctx.stroke();

  // === 法线（虚线）===
  ctx.strokeStyle = '#94a3b8';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([6, 4]);
  ctx.beginPath();
  ctx.moveTo(CX, 20);
  ctx.lineTo(CX, H - 20);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.font = '12px "Segoe UI", sans-serif';
  ctx.fillStyle = '#94a3b8';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText('法线', CX, 4);

  // === 入射点 ===
  ctx.fillStyle = '#1e293b';
  ctx.beginPath();
  ctx.arc(CX, CY, 5, 0, PI * 2);
  ctx.fill();

  // === 光线参数 ===
  // 入射光：从左上方射向入射点
  const incAngle = theta1; // 法线左侧为正
  const incEndX = CX - RAY_LEN * Math.sin(incAngle);
  const incEndY = CY - RAY_LEN * Math.cos(incAngle);

  // 反射光：向右上方
  const refEndX = CX + RAY_LEN * Math.sin(incAngle);
  const refEndY = CY - RAY_LEN * Math.cos(incAngle);

  // 入射光线
  drawLightRay(incEndX, incEndY, CX, CY, '#3b82f6', 3, '入射光', 'left', 'bottom');

  // 反射光线
  drawLightRay(CX, CY, refEndX, refEndY, '#22c55e', 2.5, '反射光', 'right', 'bottom');

  // 折射光线
  if (hasRefraction) {
    const refrAngle = theta2;
    const refrEndX = CX + RAY_LEN * Math.sin(refrAngle);
    const refrEndY = CY + RAY_LEN * Math.cos(refrAngle);
    drawLightRay(CX, CY, refrEndX, refrEndY, '#ef4444', 2.5, '折射光', 'right', 'top');
  }

  // === 角度弧 ===
  // 入射角弧（法线左侧，上方）
  ctx.strokeStyle = '#3b82f6';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(CX, CY, 50, -PI/2 - theta1, -PI/2);
  ctx.stroke();
  // 入射角标签
  const labelR1 = 64;
  ctx.fillStyle = '#3b82f6';
  ctx.font = 'bold 14px "Segoe UI", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText(`θ₁=${(theta1/DEG).toFixed(1)}°`, CX - labelR1 * Math.sin(theta1/2), CY - 8 - labelR1 * Math.cos(theta1/2));

  // 反射角弧（法线右侧，上方）
  ctx.strokeStyle = '#22c55e';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(CX, CY, 50, -PI/2, -PI/2 + theta1);
  ctx.stroke();
  // 反射角标签
  ctx.fillStyle = '#22c55e';
  ctx.textBaseline = 'bottom';
  ctx.fillText(`θ₂=${(theta1/DEG).toFixed(1)}°`, CX + labelR1 * Math.sin(theta1/2), CY - 8 - labelR1 * Math.cos(theta1/2));

  // 折射角弧（法线右侧，下方）
  if (hasRefraction) {
    ctx.strokeStyle = '#ef4444';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(CX, CY, 45, PI/2, PI/2 + theta2);
    ctx.stroke();
    // 折射角标签
    const labelR2 = 60;
    ctx.fillStyle = '#ef4444';
    ctx.textBaseline = 'top';
    ctx.fillText(`θ₃=${(theta2/DEG).toFixed(1)}°`, CX + labelR2 * Math.sin(theta2/2), CY + 6 + labelR2 * Math.cos(theta2/2));
  }

  // === 全反射提示 ===
  if (hasTIR) {
    ctx.fillStyle = 'rgba(239,68,68,0.12)';
    ctx.fillRect(0, CY, W, H - CY);

    ctx.fillStyle = '#ef4444';
    ctx.font = 'bold 18px "Segoe UI", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('⚡ 全反射 (Total Internal Reflection)', CX, CY + (H - CY) / 2);

    // 临界角
    const thetaC = Math.asin(n2 / n1) / DEG;
    ctx.font = '14px "Segoe UI", sans-serif';
    ctx.fillText(`临界角 θc = ${thetaC.toFixed(1)}°  (入射角 ${(theta1/DEG).toFixed(1)}° > ${thetaC.toFixed(1)}°)`, CX, CY + (H - CY) / 2 + 28);
  }

  // === Snell 定律公式 ===
  ctx.fillStyle = 'rgba(15,23,42,0.7)';
  ctx.font = '14px "Segoe UI", sans-serif';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'bottom';
  const sin1 = Math.sin(theta1);
  const sin2 = hasRefraction ? Math.sin(theta2) : 0;
  const lhs = (n1 * sin1).toFixed(4);
  const rhs = hasRefraction ? (n2 * sin2).toFixed(4) : '—';
  ctx.fillText(`n₁·sinθ₁ = ${n1.toFixed(2)}×${sin1.toFixed(4)} = ${lhs}`, W - 16, CY - 10);
  ctx.textBaseline = 'top';
  ctx.fillText(`n₂·sinθ₂ = ${n2.toFixed(2)}×${hasRefraction ? sin2.toFixed(4) : '—'} = ${rhs}`, W - 16, CY + 10);
}

// 辅助：绘制光线（带发光效果）
function drawLightRay(x1, y1, x2, y2, color, width, label, alignX, alignY) {
  // 发光
  ctx.save();
  ctx.strokeStyle = color;
  ctx.globalAlpha = 0.15;
  ctx.lineWidth = width + 8;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();

  // 主光线
  ctx.globalAlpha = 0.85;
  ctx.lineWidth = width;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.restore();

  // 标签
  const mx = (x1 + x2) / 2;
  const my = (y1 + y2) / 2;
  ctx.fillStyle = color;
  ctx.font = 'bold 13px "Segoe UI", sans-serif';
  ctx.textAlign = alignX === 'left' ? 'right' : 'left';
  ctx.textBaseline = alignY === 'bottom' ? 'bottom' : 'top';
  const offsetX = alignX === 'left' ? -8 : 8;
  const offsetY = alignY === 'bottom' ? -4 : 4;
  ctx.fillText(label, mx + offsetX, my + offsetY);
}

// ============================================================
// 启动
// ============================================================
updatePhysics();
</script>
</body>
</html>
